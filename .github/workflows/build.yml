name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["7.1", "7.2", "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]
    name: PHP ${{ matrix.php-version }}
    steps:
      - uses: actions/checkout@v5.0.1

      - name: Install Ghostscript
        run: sudo apt-get update -qq && sudo apt-get install -y ghostscript

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          tools: composer:v2

      - name: Pin PHPUnit version
        run: |
          PHP="${{ matrix.php-version }}"
          case "$PHP" in
            7.1|7.2)      PHPUNIT="^7.0"  ;;
            7.3|7.4|8.0)  PHPUNIT="^9.0"  ;;
            8.1)           PHPUNIT="^10.0" ;;
            8.2)           PHPUNIT="^11.0" ;;
            8.3)           PHPUNIT="^12.0" ;;
            8.4)           PHPUNIT="^13.0" ;;
          esac
          composer require --dev --no-update "phpunit/phpunit:$PHPUNIT"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Run tests
        run: composer test

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.4'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
